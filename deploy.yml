- name: Deploy index.html
  hosts: ec2
  become: true

  vars:
    app_dir: /var/www/html

  tasks:

    - name: Install Apache web server
      apt:
        name: apache2
        state: present
        update_cache: true

    - name: Start Apache
      service:
        name: apache2
        state: started
        enabled: true

    - name: Copy index.html to server
      copy:
        src: index.html
        dest: /var/www/html/index.html
